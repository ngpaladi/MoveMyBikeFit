<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">MoveMyBikeFit</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Compare</a>
      <a href="{{ '/add.html' | relative_url }}" {% if page.url contains 'add' %}class="active"{% endif %}>Add Bike</a>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
