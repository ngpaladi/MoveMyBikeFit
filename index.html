---
layout: default
title: Compare
---

<div class="app-wrap" data-panel="canvas">
  <aside class="sidebar">
    <!-- Bike selector -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">Bikes</div>
      <input type="text" id="search-box" class="search-box" placeholder="Search brand or model…">
    </div>

    <div class="bike-list" id="bike-list">
      <div id="bike-list-inner" class="bike-list-inner">
        <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">
          Loading bikes…
        </div>
      </div>
    </div>

    <p id="error-msg" style="display:none;color:var(--accent2);font-size:12px;padding:4px 0;margin:0 14px"></p>
  </aside>

  <div class="resize-handle resize-handle-v" id="rh-sidebar"></div>

  <div class="center-area">
    <div class="canvas-area">
      <svg id="bike-svg"></svg>
      <div class="canvas-placeholder" id="canvas-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/>
          <path d="M5.5 17.5L8.5 9.5h7l3 8M12 9.5V6M10 6h4"/>
        </svg>
        <p>Select bikes from the list to compare</p>
      </div>
    </div>

    <div class="resize-handle resize-handle-h" id="rh-fit"></div>
    <div class="fit-area">
      <div class="geo-sidebar-header">Geometry</div>
      <div class="geo-scroll">
        <table class="geo-table">
          <thead id="geo-thead"></thead>
          <tbody id="geo-tbody">
            <tr><td colspan="99" class="table-empty">Select bikes to compare</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="resize-handle resize-handle-v" id="rh-geo"></div>

  <aside class="geo-sidebar">
    <!-- Your Fit measurements -->
    <div class="geo-sidebar-section">
      <div class="geo-sidebar-subheader">
        Your Fit
        <div class="unit-toggle">
          <button class="unit-btn active" data-unit="cm">cm</button>
          <button class="unit-btn" data-unit="in">in</button>
        </div>
      </div>
      <div class="input-group geo-fit-inputs">
        <div class="input-row">
          <label for="saddle-height">BB → Saddle</label>
          <input type="number" id="saddle-height" min="50" max="90" step="0.5" placeholder="—">
          <span class="unit fit-unit-label">cm</span>
        </div>
        <div class="input-row">
          <label for="seat-to-hood">Saddle → Hoods</label>
          <input type="number" id="seat-to-hood" min="40" max="80" step="0.5" placeholder="—">
          <span class="unit fit-unit-label">cm</span>
        </div>
        <div class="input-row">
          <label for="hood-to-bb">Hoods → BB</label>
          <input type="number" id="hood-to-bb" min="50" max="90" step="0.5" placeholder="—">
          <span class="unit fit-unit-label">cm</span>
        </div>
        <div class="input-row">
          <label for="inseam">Inseam</label>
          <input type="number" id="inseam" min="60" max="105" step="0.5" placeholder="—">
          <span class="unit fit-unit-label">cm</span>
          <label class="show-inseam-label" title="Draw inseam height on canvas">
            <input type="checkbox" id="show-inseam">
            <span>show</span>
          </label>
        </div>
      </div>
    </div>
    <!-- Components + Fit Adjustments -->
    <div class="geo-scroll" id="right-scroll">
      <div id="cockpit-inputs"></div>
      <div id="fit-results"></div>
    </div>
  </aside>
</div>

<nav class="mobile-nav">
  <button class="mobile-tab active" data-panel="canvas">Compare</button>
  <button class="mobile-tab" data-panel="bikes">Bikes</button>
  <button class="mobile-tab" data-panel="geo">Fit</button>
</nav>


<script src="{{ '/assets/js/BikeStore.js' | relative_url }}"></script>
<script src="{{ '/assets/js/FitCalculator.js' | relative_url }}"></script>
<script src="{{ '/assets/js/BikeRenderer.js' | relative_url }}"></script>
<script src="{{ '/assets/js/app.js' | relative_url }}"></script>
